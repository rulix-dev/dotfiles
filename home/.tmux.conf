
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

unbind C-s
set -g prefix C-s
bind C-s send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g detach-on-destroy off  # don't exit from tmux when closing a session

# Shift arrow (L/R) to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window
# Shift arrow (U/D) to switch panes
bind -n S-Up select-pane -t -
bind -n S-Down select-pane -t +

bind -n M-] switch-client -n
bind -n M-[ switch-client -p

##### Display Popups ##### 

bind C-y display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"
bind C-n display-popup -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name && tmux switch-client -t \$name"'
bind C-b display-popup \
  -w 80% \
  -h 80% \
  -E 'btop'
bind C-t display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "zsh"


bind-key "s" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux --reverse -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind-key "w" run-shell "sesh window \"$(sesh window | fzf-tmux --reverse -p 60%,50% --prompt '🪟  ')\""
bind-key "k" display-popup -E -w 40% "sesh connect \"$(
 sesh list -i | gum filter --limit 1 --no-sort --fuzzy --placeholder 'Pick a sesh' --height 50 --prompt='⚡'
)\""

#bind-key "K" display-popup -h 50% -w 50% -E "sesh picker -i"

#bind C-x display-popup -w 80% -h 80% -E "tmux new-session -A -s scratch"
bind C-x display-popup -w 90% -h 90% -d "~" -E "tmux new-session -A -s MAIN_CLAUDE 'zsh -c \"source ~/.zshrc.Claude && cd ~ && claude_session MAIN_CLAUDE\"'"

bind-key "X" run-shell "echo $SHELL > /tmp/tmux-shell && echo $PATH > /tmp/tmux-path"

set -g @catppuccin_flavor 'macchiato'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tony-sol/tmux-kubectx'


# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"


set -g @catppuccin_directory_text " #{s|.*/([^/]+/[^/]+)$|\\1|:pane_current_path}"

# Window display (new catppuccin/tmux options)
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_text " W: #W"
set -g @catppuccin_window_current_text " W: #W"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_session_text " S: #S"


# Status bar modules
set -g @catppuccin_date_time_text " %H:%M"

set -g @catppuccin_pane_border_status "yes" # set to "yes" to enable
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_1}"


set -g status-position bottom

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
#set -ag status-right "#{E:@catppuccin_status_application}"
#set -agF status-right "#{E:@catppuccin_status_cpu}"
#set -agF status-right "#{E:@catppuccin_status_ram}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-left "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_kube}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right "#{E:@catppuccin_status_date_time}"



run '~/.tmux/plugins/tpm/tpm'
run ~/.tmux/plugins/tmux/catppuccin.tmux
